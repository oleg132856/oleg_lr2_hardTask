<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Калькулятор повышенной сложности</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background-color: #f0f0f0; }
        .calc-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; }
        
        input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 18px; }
        #result { font-weight: bold; background-color: #e9e9e9; }
        
       
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .ops { display: flex; gap: 5px; margin-bottom: 10px; }
        
        button { padding: 15px; font-size: 18px; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; background: #f9f9f9; }
        button:hover { background: #e0e0e0; }
        .btn-calc { width: 100%; background-color: #4CAF50; color: white; border: none; font-weight: bold; }
        .btn-calc:hover { background-color: #45a049; }
        
        /* Фокус на активном поле */
        input:focus { border-color: #4CAF50; outline: none; background-color: #f0fff0; }
    </style>
</head>
<body>

<div class="calc-container">
    <input type="number" id="num1" placeholder="Число 1" readonly>
    <input type="number" id="num2" placeholder="Число 2" readonly>
    
    <div class="ops">
        <button onclick="setOp('+')">+</button>
        <button onclick="setOp('-')">-</button>
        <button onclick="setOp('*')">*</button>
        <button onclick="setOp('/')">/</button>
    </div>

    <div class="grid">
        <button onclick="addDigit(1)">1</button>
        <button onclick="addDigit(2)">2</button>
        <button onclick="addDigit(3)">3</button>
        <button onclick="addDigit(4)">4</button>
        <button onclick="addDigit(5)">5</button>
        <button onclick="addDigit(6)">6</button>
        <button onclick="addDigit(7)">7</button>
        <button onclick="addDigit(8)">8</button>
        <button onclick="addDigit(9)">9</button>
        <button onclick="addDigit(0)" style="grid-column: span 2;">0</button>
        <button onclick="clearInputs()" style="color: red;">C</button>
    </div>

    <button class="btn-calc" onclick="calculate()">ПОСЧИТАТЬ</button>
    
    <p>Ответ:</p>
    <input type="text" id="result" placeholder="Результат" readonly>
</div>

<script>
    let currentInputId = 'num1';
    let operation = '+';

    document.getElementById('num1').onclick = () => currentInputId = 'num1';
    document.getElementById('num2').onclick = () => currentInputId = 'num2';

    function addDigit(digit) {
        document.getElementById(currentInputId).value += digit;
    }

    function setOp(op) {
        operation = op;
        currentInputId = 'num2'; 
    }

    function clearInputs() {
        document.getElementById('num1').value = '';
        document.getElementById('num2').value = '';
        const resField = document.getElementById('result');
        resField.value = '';
        resField.style.backgroundColor = '#e9e9e9';
        currentInputId = 'num1';
    }

    function calculate() {
        const n1 = parseFloat(document.getElementById('num1').value);
        const n2 = parseFloat(document.getElementById('num2').value);
        const resField = document.getElementById('result');
        
        if (isNaN(n1) || isNaN(n2)) {
            alert("Введите оба числа");
            return;
        }

        let res;
        switch(operation) {
            case '+': res = n1 + n2; break;
            case '-': res = n1 - n2; break;
            case '*': res = n1 * n2; break;
            case '/': res = n2 !== 0 ? n1 / n2 : "Ошибка"; break;
        }


        if (typeof res === 'number' && res > 15) {
            resField.value = "число>15";
            resField.style.backgroundColor = "red";
            resField.style.color = "white";
        } else {
            resField.value = res;
            resField.style.backgroundColor = "#e9e9e9";
            resField.style.color = "black";
        }
    }
</script>

</body>
</html>
